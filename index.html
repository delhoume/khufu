<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khufu - TIFF Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                         'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                         sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            flex-shrink: 0;
        }

        .card-header h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .card-filename {
            font-size: 0.9rem;
            opacity: 0.9;
            font-family: monospace;
        }

        .card-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #666;
        }

        .info-value {
            color: #333;
            text-align: right;
        }

        .card-footer {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            font-size: 1rem;
            text-align: center;
            transition: opacity 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 40px;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .empty-state h2 {
            color: #666;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #999;
        }

        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .badge.tiled {
            background: #51cf66;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖼️ Khufu - TIFF Viewer</h1>
            <p>Available TIFF Images</p>
        </header>

        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading">Loading TIFF files...</div>
        <div id="grid" class="grid" style="display: none;"></div>
        <div id="empty" class="empty-state" style="display: none;">
            <h2>No TIFF files found</h2>
            <p>Place your TIFF files in the image folder to see them here.</p>
        </div>
    </div>

    <script>
        async function loadTiffFiles() {
            try {
                const response = await fetch('/info');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                displayTiffFiles(data);
            } catch (error) {
                showError(`Failed to load TIFF files: ${error.message}`);
                console.error(error);
            }
        }

        function displayTiffFiles(data) {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty');

            const files = Object.entries(data);

            if (files.length === 0) {
                loading.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            grid.innerHTML = '';

            files.forEach(([id, info]) => {
                const card = createCard(id, info);
                grid.appendChild(card);
            });

            loading.style.display = 'none';
            grid.style.display = 'grid';
        }

        function createCard(id, info) {
            const card = document.createElement('div');
            card.className = 'card';

            const mainLevel = info.levels.find(l => l.full) || info.levels[0];
            const width = mainLevel ? mainLevel.width : 'N/A';
            const height = mainLevel ? mainLevel.height : 'N/A';

            let html = `
                <div class="card-header">
                    <h3>${id}</h3>
                    <div class="card-filename">${info.filename}</div>
                </div>
                <div class="card-body">
                    <div class="info-row">
                        <span class="info-label">Dimensions:</span>
                        <span class="info-value">${width} × ${height}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Levels:</span>
                        <span class="info-value">${info.nlevels}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Samples/Pixel:</span>
                        <span class="info-value">${info.samplesperpixel}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Bits/Sample:</span>
                        <span class="info-value">${info.bitspersample}</span>
                    </div>
            `;

            if (info.tiled) {
                html += `
                    <div class="info-row">
                        <span class="info-label">Tile Size:</span>
                        <span class="info-value">${info.tilewidth} × ${info.tileheight}</span>
                    </div>
                    <div style="margin-top: 10px;">
                        <span class="badge tiled">Tiled</span>
                    </div>
                `;
            }

            html += `
                </div>
            `;

            if (info.tiled) {
                html += `
                <div class="card-footer">
                    <a href="/show/${id}" class="btn">View Image</a>
                </div>
                `;
            }

            html += `
            `;

            card.innerHTML = html;
            return card;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            const loading = document.getElementById('loading');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            loading.style.display = 'none';
        }

        // Load files when page loads
        document.addEventListener('DOMContentLoaded', loadTiffFiles);
    </script>
</body>
</html>
